<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Attendance Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; min-width: 60%; }
        h1 { color: #1a73e8; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #1a73e8; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .status { color: #28a745; font-weight: bold; }
        .no-data { padding: 20px; color: #666; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Attendance Dashboard</h1>
        <hr>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Time & Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% if attendances %}
                    {% for record in attendances %}
                    <tr>
                        <td>{{ record.name.capitalize() }}</td>
                        <td>{{ record.time }}</td>
                        <td class="status">{{ record.status }}</td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td colspan="3" class="no-data">No attendance records found. Please run face_detector.py first!</td>
                    </tr>
                {% endif %}
            </tbody>
        </table>
    </div>
</body>
</html>
