<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Company - Aria AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-success text-white text-center py-3">
                        <h4 class="mb-0">AI Attendance System Registration</h4>
                    </div>
                    <div class="card-body p-4">
                        <form action="/register_company" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Company Name</label>
                                <input type="text" name="name" class="form-control" placeholder="e.g. Ali Traders" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Admin Email</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Set Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2">Create My Account</button>
                        </form>
                        <div class="text-center mt-3">
                            <small>Already have an account? <a href="/login">Login</a></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
